  <rect x="66" y="20" width="42" height="42" rx="6" ry="6" fill="#f2b179"/>
  <rect x="20" y="66" width="42" height="42" rx="6" ry="6" fill="#edcf72"/>
  <rect x="66" y="66" width="42" height="42" rx="6" ry="6" fill="#edc22e"/>
</svg>
