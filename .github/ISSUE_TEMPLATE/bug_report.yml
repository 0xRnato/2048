name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered list of actions to reliably trigger the bug.
      placeholder: |
        1. Start a new Classic game
        2. Make 4 moves
        3. Observe the score value
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (Chrome)
        - Web (Firefox)
        - Web (Safari)
        - Web (other)
        - Android
        - Editor (Windows)
        - Editor (macOS)
        - Editor (Linux)
    validations:
      required: true

  - type: input
    id: godot_version
    attributes:
      label: Godot version
      placeholder: 4.6.2-stable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Attach log from `user://logs/` and a screenshot if relevant.
