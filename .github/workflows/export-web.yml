name: Export Web Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.2

jobs:
  export:
    name: Export HTML5
    runs-on: ubuntu-latest
    if: false   # enabled in M6
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and Web templates
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "${BASE}/${GODOT_ZIP}"
          curl -sSL -o templates.tpz "${BASE}/${TEMPLATES_TPZ}"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project
        run: godot --headless --path . --import

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html
          test -f build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: export
    runs-on: ubuntu-latest
    if: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
