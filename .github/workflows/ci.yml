name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (gdformat + gdlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gdtoolkit
        run: pip install gdtoolkit==4.*

      - name: gdformat --check
        run: gdformat --check scripts tests || true

      - name: gdlint
        run: gdlint scripts tests || true

  verify-project:
    name: Verify Godot project imports
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "${BASE}/${GODOT_ZIP}"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project
        run: godot --headless --path . --import

  test:
    name: Tests (GUT)
    runs-on: ubuntu-latest
    needs: verify-project
    env:
      GODOT_VERSION: 4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "${BASE}/${GODOT_ZIP}"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project (populate .godot cache)
        run: godot --headless --path . --import

      - name: Run GUT tests
        run: |
          godot --headless --path . -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests/unit,res://tests/integration \
            -ginclude_subdirs \
            -gexit
