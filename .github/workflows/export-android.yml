name: Export Android Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_VERSION: 4.6.2

jobs:
  export:
    name: Build APK and AAB
    runs-on: ubuntu-latest
    if: false   # enabled in M7
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Godot and Android templates
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "${BASE}/${GODOT_ZIP}"
          curl -sSL -o templates.tpz "${BASE}/${TEMPLATES_TPZ}"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Import project
        run: godot --headless --path . --import

      - name: Export APK
        run: |
          mkdir -p build/android
          godot --headless --path . --export-release "Android" build/android/app-release.apk

      - name: Export AAB
        run: godot --headless --path . --export-release "Android AAB" build/android/app-release.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/android/
