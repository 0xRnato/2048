name: Export Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_VERSION: 4.6.2

jobs:
  export:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" \
            "platforms;android-34" "platforms;android-35" \
            "build-tools;34.0.0" "build-tools;35.0.0"

      - name: Install Godot and templates
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -sSL -o godot.zip "${BASE}/${GODOT_ZIP}"
          curl -sSL -o templates.tpz "${BASE}/${TEMPLATES_TPZ}"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Install Android build template into project
        run: |
          set -e
          mkdir -p android/build
          unzip -o -q ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_source.zip -d android/build
          ls android/build | head -10

      - name: Generate debug keystore
        run: |
          set -e
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings for Android SDK and keystore
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${HOME}/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "--- editor settings ---"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Import project
        run: godot --headless --path . --import

      - name: Export Android APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --path . --verbose --export-debug "Android" build/android/2048.apk
          test -f build/android/2048.apk
          ls -lh build/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/2048.apk
          if-no-files-found: error
