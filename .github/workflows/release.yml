name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          awk -v ver="[$VERSION]" '
            $0 ~ "^## " ver { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for ${TAG}, falling back to tag message."
            git tag -l "$TAG" -n20 > release_notes.md
          fi
          cat release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          PRE_FLAG=""
          case "$TAG" in
            *-alpha*|*-beta*|*-rc*) PRE_FLAG="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            $PRE_FLAG
